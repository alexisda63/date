<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Une question importante ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    color:#ff4d6d;
}

.buttons{
    margin-top:30px;
    position:relative;
    height:120px;
}

button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#yes{
    background:#4CAF50;
    color:white;
}

#no{
    background:#f44336;
    color:white;
    position:absolute;
    left:180px;
}

#result{
    margin-top:20px;
    font-size:22px;
    color:#ff4d6d;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
    <h1>❤️ J'ai une question pour toi ❤️</h1>
    <p>Est-ce que tu accepterais de sortir en date avec moi ? 😊</p>

    <div class="buttons">
        <button id="yes">Oui ❤️</button>
        <button id="no">Non 😅</button>
    </div>

    <div id="result"></div>
</div>

<script>
const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * 250;
    const y = Math.random() * 80;
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

document.getElementById("yes").addEventListener("click", () => {
    document.getElementById("result").innerHTML =
        "🥰 Génial ! J'ai hâte de passer du temps avec toi ❤️";
});
</script>

</body>
</html>
